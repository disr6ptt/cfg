clear

alias eae "exec autoexec"
log_color General AF0000FF;	//console color: red

alias +lj "+jump;+!forward;-!duck";
alias -lj "-jump;+!duck";

alias +jb "+jump;+!duck"
alias -jb "-jump"

//AUTOSTART COMMANDS
	r_drawworld 0
    cl_showfps 1
    engine_low_latency_sleep_after_client_tick 1
    snd_mixahead 0.004
    rate 1000000
    r_csgo_water_effects 0
    r_csgo_water_refraction 0
    r_csgo_effects_bloom 0
    fps_max_tools 240
    fps_max_menu 240
    fps_max_ui 240
    sensitivity 1.461039
    m_yaw 0.022000
    sv_jump_spam_penalty_time 0.000002; //placebo?
    cl_sniper_auto_rezoom 1
    cl_hud_color 5
    mm_dedicated_search_maxping 25
    cl_prefer_lefthanded 1

//TOGGLEHUD
	bind "p" "toggle cl_draw_only_deathnotices 0 1"

//CROSSHAIR
    //CROSSHAIR
    hud_showtargetid 1;cl_crosshairgap_useweaponvalue false;cl_crosshair_recoil 0;cl_crosshair_friendly_warning 0;cl_crosshairstyle 4;cl_crosshairthickness 0.500000;cl_crosshair_outlinethickness 0.5; cl_crosshairsize 2; cl_crosshairgap -1.000000; cl_crosshairdot false; crosshair 1; cl_crosshair_drawoutline 1; cl_crosshair_recoil false; cl_crosshairgap -1.000000; cl_crosshairdot false; crosshair 1; cl_crosshair_recoil false

    //CROSSHAIR COLOR
        alias crosshair_blue    "cl_crosshaircolor 5;cl_crosshaircolor_b 255;cl_crosshaircolor_r 50;cl_crosshaircolor_g 255"
		alias crosshair_white	"cl_crosshaircolor_r 255;cl_crosshaircolor_g 255;cl_crosshaircolor_b 255"
		alias crosshair_red		"cl_crosshaircolor_r 255;cl_crosshaircolor_g 0;cl_crosshaircolor_b 0"
		alias crosshair_black	"cl_crosshaircolor_r 0;cl_crosshaircolor_g 0;cl_crosshaircolor_b 0"
		alias crosshair_green 	"cl_crosshaircolor_r 0;cl_crosshaircolor_g 255;cl_crosshaircolor_b 0"
		alias crosshair_purple	"cl_crosshaircolor_r 174;cl_crosshaircolor_g 0;cl_crosshaircolor_b 255"
		alias crosshair_pink	"cl_crosshaircolor_r 255;cl_crosshaircolor_g 192;cl_crosshaircolor_b 203"


//BINDS
    //MOUSE
        bind "MOUSE_X" "yaw"
        bind "MOUSE_Y" "pitch"
        bind "mouse1" "+attack"
        bind "mouse2" "+attack2"
        bind "mouse3" "player_ping"
        bind mouse4 "+voicerecord;"
        bind "MWHEELDOWN" "+jump"

	// JB BIND
	bind mwheelup "+jb"

	// LJ BIND
	//bind mouse5 "+lj"

    //ALPHABET

		//bind "w" "+forward"
		//bind "a" "+left"
		//bind "s" "+back"
		//bind "d" "+right"
		bind "b" "buymenu;+laver"
        bind "c" "slot6;slot10;slot8;slot7;switchhandsleft"
		bind "e" "+use;"
		bind "f" "+lookatweapon;"
		bind "g" "drop;"
		bind "h" "switchhands;"
		//bind "i" "show_loadout_toggle"
		//bind "j" ""
		bind "m" "teammenu;"
		//bind "n" "slot9;"
		//bind "o" "noclip"
		bind "q" "+qsw;"
		bind "r" "+reload;"
		//bind "t" "+spray_menu;"
		bind "u" "messagemode2"
		bind "v" "slot10;slot8;slot7;slot6;switchhandsleft"
		bind "x" "slot6;slot7;slot10;slot8;switchhandsleft"
		bind "y" "messagemode"
		bind "z" "slot6;slot7;slot8;slot9;slot10;switchhandsleft"

	//FUNCTION
		
		bind "F3" "dc"
		//bind "F3" "autobuy"
		bind "F4" "rebuy"
		bind "F5" "jpeg"
		bind "F6" "save quick"
//		bind "F7" "load quick"
		bind "F10" "quit prompt"

    //NUMBERS
        bind "1" "slot1;switchhandsleft"
        bind "2" "slot2;switchhandsleft"
        bind "3" "slot3;switchhandsright"
        bind "4" "slot5;switchhandsleft"
        bind "5" "slot4;switchhandsleft"
	//SPECIAL
		bind "SPACE" "+jump"
		bind "TAB" "+showscores"
		bind "ESCAPE" "cancelselect"
		bind "DEL" "mute"
		bind "PAUSE" "pause"
		bind "SHIFT" "+sprint;"
		bind "ALT" "toggleradarscale"
		bind "CTRL" "+duck;"
    
    //SV_CHEATS 1
        bind "ENTER" "ent_fire smokegrenade_projectile kill;stopsound"

	// NULLS (dont touch these unless theyre broken)
		bind w "+forward"
		bind a "+a"
		bind s "+s"
		bind d "+d"
	exec nulls

//VIEWMODEL
    viewmodel_fov 68.000000;viewmodel_offset_z -2.00;viewmodel_offset_y 2.00;viewmodel_offset_x 2


//RADAR
    cl_radar_always_centered false;cl_radar_icon_scale_min 0.500000;cl_radar_rotate true;cl_radar_scale 0.350000;cl_hud_radar_background_alpha 0.000000;cl_hud_radar_scale 0.800000


//QSW
    alias +qsw "slot3;switchhandsright";alias -qsw "slot2;slot1;switchhandsleft"; bind q +qsw

bind w +reset
alias +reset "+w;bind mwheelup jb"
alias -reset "-w"
alias jb "+duck;bind mwheelup jb1"
alias jb1 "-duck;-!jump;+!jump"

//EASY DISCONNECT
    alias dc "disconnect;eae"
